<header class=" flex flex-row justify-between
                fixed border-b  top-0 left-0 w-full h-20 bg-[#BABABA] text-[#006EC7] items-center">

  <div class="flex flex-row justify-end align-middle">
    <div class="w-14 h-14 rounded-full align-middle overflow-hidden border border-slate-900 mx-6">
      <img
        src="https://media.licdn.com/dms/image/v2/D4E03AQFrALhVFN3c3w/profile-displayphoto-shrink_400_400/profile-displayphoto-shrink_400_400/0/1696699686355?e=1773878400&v=beta&t=cOanIptrq9TY4Nue5EdEg4r1raWWk1EaLbldqlRVCrQ"
        class="w-full h-full object-cover object-center"
      />
    </div>
    <div class="text-[#000051] self-center">Lena Akimov</div>
  </div>

  <div class="flex flex-row h-full px-6">

    <button (click)="onSkills()" class="text-[#000051] h-full border-b-4 border-b-[#BABABA] px-4 flex-col cursor-pointer
                  flex items-center align-middle justify-end hover:text-[#173DED]
                  hover:border-b-4 hover:border-b-[#173DED] hover:bg-[#DCDEE2] pb-2" >
      <mat-icon>home</mat-icon>
      Start
    </button>

    <button (click)="onSkills()" class="text-[#000051] h-full border-b-4 border-b-[#BABABA] px-4 flex-col cursor-pointer
                  flex items-center align-middle justify-end hover:text-[#173DED]
                  hover:border-b-4 hover:border-b-[#173DED] hover:bg-[#DCDEE2] pb-2" >
      <mat-icon>psychology_alt</mat-icon>
      Skills
    </button>
    <button (click)="onSkills()" class="text-[#000051] h-full border-b-4 border-b-[#BABABA] px-4 flex-col cursor-pointer
                  flex items-center align-middle justify-end hover:text-[#173DED]
                  hover:border-b-4 hover:border-b-[#173DED] hover:bg-[#DCDEE2] pb-2" >
      <mat-icon>desktop_mac</mat-icon>
      Learning
    </button>
    <button (click)="onSkills()" class="text-[#000051] h-full border-b-4 border-b-[#BABABA] px-4 flex-col cursor-pointer
                  flex items-center align-middle justify-end hover:text-[#173DED]
                  hover:border-b-4 hover:border-b-[#173DED] hover:bg-[#DCDEE2] pb-2" >
      <mat-icon>menu_book</mat-icon>
      Working
    </button>
  </div>
</header>

<!-- Main -->
<main class="absolute top-20 left-0 right-0 bottom-0 h-full overflow-y-auto p-12 bg-slate-950">
  @if (skillsVisible) {
    <app-skills></app-skills>
  }

</main>
